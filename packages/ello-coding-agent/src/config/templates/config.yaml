# 当前激活的模型套件；TUI 使用 /profiles 切换。
active_profile: main

# provider 只描述连接、认证和 provider 类型，不承载 agent 使用意图。
provider:
  openai:
    name: OpenAI
    enabled: true
    kind: openai
    api_key_env: OPENAI_API_KEY
    base_url: https://api.openai.com/v1
  anthropic:
    name: Anthropic
    enabled: true
    kind: anthropic
    api_key_env: ANTHROPIC_API_KEY

# profile 是一组 role 到模型的明确绑定。
profile:
  main:
    label: Main
    description: 高质量编码任务的默认模型套件。
    models:
      primary: openai/gpt-5.5
      small: openai/gpt-5.4
      compact: openai/gpt-5.4
      title: openai/gpt-5.4
      review: anthropic/claude-sonnet-4.6
    settings:
      primary:
        reasoning_effort: medium
      small:
        reasoning_effort: low
      compact:
        reasoning_effort: low
      title:
        reasoning_effort: low
      review:
        reasoning_effort: high
  anthropic:
    label: Anthropic
    description: 偏向 Anthropic 的编码与审查模型套件。
    models:
      primary: anthropic/claude-sonnet-4.6
      small: anthropic/claude-haiku-4.5
      compact: anthropic/claude-haiku-4.5
      title: anthropic/claude-haiku-4.5
      review: anthropic/claude-opus-4.8
    settings:
      primary:
        reasoning_effort: medium
      small:
        reasoning_effort: low
      compact:
        reasoning_effort: low
      title:
        reasoning_effort: low
      review:
        reasoning_effort: high

# 默认工作目录；通常不要写死，命令行 --cwd 会覆盖。
# cwd: /path/to/project

# 会话保存目录；留空时使用 ~/.ello/sessions。
# sessionDir: ~/.ello/sessions

# 新会话初始模式。可选 default、plan、accept-edits、bypass。
initial_mode: default
# bypass 必须同时由这个安全开关显式启用。
bypass_enabled: false

# 允许工具访问的路径根目录；默认至少包含当前 cwd。
# allowedPaths:
#   - /path/to/project

# 细粒度权限规则；通常由权限命令或 TUI 写入，不建议手写复杂规则。
# permissionRules: []

# MCP 配置文件路径；默认使用 ~/.ello/mcp.json。
# mcpConfigPath: ~/.ello/mcp.json

# system prompt 配置名；默认 coding。
# systemPromptProfile: coding

# context pipeline 配置。
# 运行期信息会作为可观测 source 注入 system，而不是拼在 base prompt 尾部。
# context:
#   max_input_tokens: 160000
#   reserved_output_tokens: 8000
#   show_sources_in_tui: true
#   system_prompt_profile: coding
#   instructions:
#     global:
#       - ~/.ello/ELLO.md
#     project:
#       - AGENTS.md
#       - .ello/ELLO.md
#       - .ello/instructions.md
#     extra:
#       - docs/**/*.agent.md
#       - https://example.com/team-agent-rules.md
#     nearby: true
#   compaction:
#     auto: true
#     tail_turns: 2
#     preserve_recent_tokens: 20000
#     reserved_tokens: 16384
#     prune_tool_output: false
#     tool_output_max_chars: 2000
#   memory:
#     enabled: false
#     private_dir: ~/.ello/memory/private
#     team_dir: .ello/memory/team
#     extraction:
#       enabled: true
#       recent_messages: 40
#       max_attempts: 2

# 默认启用交互式 TUI；命令行 --no-tui 可临时关闭。
# tui: true

# Goal 自动续跑的 host 上限。达到后目标暂停，不会伪装成完成。
# goal:
#   max_continuations: 20

# Langfuse 链路追踪默认关闭。关闭时无需配置 URL 或密钥；开启后密钥从
# LANGFUSE_PUBLIC_KEY 和 LANGFUSE_SECRET_KEY 环境变量读取。
# observability:
#   langfuse:
#     enabled: false
#
# 启用时必须提供完整连接配置：
# observability:
#   langfuse:
#     enabled: true
#     base_url: http://localhost:3000
#     environment: development
#     release: ello-ts-local
#     content: metadata # metadata 或 full

# 工具配置。disabled 表示完全不注册；needApproval 在 Default/Accept edits 下要求审批，
# 但 Accept edits 会自动放行 edit 类工具，Bypass 会跳过全部审批。
# routing_enabled=true 时模型只直接看到 tool_search/call_tool。
# tools:
#   disabled: []
#   needApproval:
#     - bash
#     - web_fetch
#   routing_enabled: false
#   search:
#     result_limit: 6
#     max_result_bytes: 24000

# 工具长输出策略；超过阈值时模型只收到 preview，完整内容写入 session artifact。
# tool_output:
#   max_bytes: 12000
#   max_lines: 400
#   preview_lines: 120

# provider 专属 HTTP headers。
# provider:
#   openai:
#     headers:
#       OpenAI-Organization: ${OPENAI_ORG_ID}

# 项目信任配置；路径可以直接作为 YAML key。
# projects:
#   /path/to/project:
#     trust_level: trusted

# workspace 挂载根目录；默认使用 ~/.ello。
# 活动 workspace 位于 <mount>/workspace，归档 workspace 位于 <mount>/archive。
# workspace:
#   mount: ~/.ello
