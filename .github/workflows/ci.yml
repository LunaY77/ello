name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  workspace:
    name: Lint, typecheck, test & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '11.11.0'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Lint check
        run: pnpm run lint

      - name: Type check
        run: pnpm run typecheck

      - name: Functional contract check
        run: pnpm run contract:check

      - name: Unit tests
        run: pnpm run test
